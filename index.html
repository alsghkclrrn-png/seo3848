<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 메뉴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <header>
    <h1>오늘의 메뉴</h1>
    <p>버튼을 눌러 당신을 위한 특별한 메뉴를 추천받으세요.</p>
  </header>
  <main>
    <section id="menu-section">
      <button id="recommend-btn">메뉴 추천받기</button>
      <div id="result-container">
          <p id="result"></p>
      </div>
    </section>

    <section id="animal-test-section">
      <hr>
      <h2>강아지상 vs 고양이상 테스트</h2>
      <p>사진을 올려주시면 인공지능이 분석해드립니다!</p>
      
      <div class="file-upload">
        <button class="file-upload-btn" type="button" onclick="$('.file-upload-input').trigger( 'click' )">이미지 업로드</button>

        <div class="image-upload-wrap">
          <input class="file-upload-input" type='file' onchange="readURL(this);" accept="image/*" />
          <div class="drag-text">
            <h3>이미지를 드래그하거나 눌러서 업로드하세요</h3>
          </div>
        </div>
        
        <div class="file-upload-content">
          <img class="file-upload-image" id="face-image" src="#" alt="your image" />
          <div class="image-title-wrap">
            <button type="button" onclick="removeUpload()" class="remove-image">삭제하기</button>
          </div>
        </div>
      </div>
      
      <div id="label-container"></div>
    </section>

    <section id="contact-section">
      <hr>
      <h2>제휴 문의</h2>
      <form action="https://formspree.io/f/xkoqdyjy" method="POST">
        <div class="form-group">
          <label for="name">성함/기업명</label>
          <input type="text" id="name" name="name" required placeholder="예: 홍길동 / (주)컴퍼니">
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" required placeholder="제휴 관련 문의 내용을 입력해주세요."></textarea>
        </div>
        <button type="submit" id="submit-btn">문의 보내기</button>
      </form>
    </section>

    <section id="comment-section">
      <hr>
      <h2>댓글</h2>
      <div id="disqus_thread"></div>
      <script>
          /**
          *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
          *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
          /*
          var disqus_config = function () {
          this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
          this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
          };
          */
          (function() { // DON'T EDIT BELOW THIS LINE
          var d = document, s = d.createElement('script');
          s.src = 'https://minseoseo.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
  </main>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
